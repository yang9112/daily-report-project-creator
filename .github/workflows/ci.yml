name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [16.x, 18.x, 20.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run linting
      run: npm run lint
      
    - name: Run tests
      run: npm test -- --coverage
      
    - name: Security audit
      run: npm audit --audit-level moderate
      
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella
        
    - name: Validate project structure
      run: npm run validate
      
  security:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Check for security vulnerabilities
      run: |
        npm ci
        npm audit --audit-level moderate
        
    - name: Check nodemailer version security
      run: |
        nodemailer_version=$(node -e "console.log(require('./package.json').dependencies.nodemailer)")
        if [[ $nodemailer_version == *"^7"* ]] || [[ $nodemailer_version == *"7"* ]]; then
          echo "❌ nodemailer version $nodemailer_version has security vulnerabilities"
          exit 1
        else
          echo "✅ nodemailer version $nodemailer_version is secure"
        fi
        
  integration:
    runs-on: ubuntu-latest
    needs: [test, security]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Test project creation
      run: |
        # Test in temporary directory
        cd /tmp
        node /github/workspace/scripts/create-project.js --name=test-project --llm=openai
        
    - name: Test validation
      run: |
        cd /tmp/test-project
        node /github/workspace/scripts/validate.js