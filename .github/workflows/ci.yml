name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run ESLint
      run: npm run lint
      continue-on-error: true
      
    - name: Validate project structure
      run: npm run validate

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [14, 16, 18, 20]
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run tests
      run: npm run test:coverage
      
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
      if: matrix.node-version == '18'

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Test project creation
      run: |
        mkdir -p /tmp/integration-test
        node scripts/create-project.js integration-test --no-github --output-dir /tmp/integration-test
        test -d /tmp/integration-test/daily-report-integration-test
        
    - name: Test batch creation
      run: |
        cat > /tmp/batch-config.json << 'EOF'
        {"projects":[{"name":"batch-test","options":{"createGitHub":false}}]}
        EOF
        node scripts/batch-create.js file /tmp/batch-config.json
        
    - name: Validate created project structure
      run: |
        cd /tmp/integration-test/daily-report-integration-test
        test -f package.json
        test -f README.md
        test -f Agent.md
        test -f SKILL.md
        test -d config
        test -d src
        test -d .github/workflows

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run security audit
      run: npm audit --audit-level=high
      continue-on-error: true
      
    - name: Check for sensitive information
      run: |
        # 检查是否有硬编码的API密钥（更严格的模式匹配）
        if grep -r -E "sk-[a-zA-Z0-9]{48}|ghp_[a-zA-Z0-9]{36}" . --include="*.js" --include="*.json" --include="*.yml" --include="*.yaml" --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=coverage --exclude-dir=tests | grep -v -E "test-api-key|your-openai-api-key-here|your-api-key|\\$\\{|\\$\\{.*\\}"; then
          echo "⚠️ Found possible API keys"
          exit 1
        else
          echo "✅ No API keys found"
        fi
        
        # 检查是否有硬编码的密码或凭证（更严格的模式匹配）
        if grep -r -E "(password|secret|token|api_key|private_key)\\s*[:=]\\s*['\"]?[^'\"\\s\\$\\{]{8,}" . --include="*.js" --include="*.json" --include="*.yml" --include="*.yaml" --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=coverage --exclude-dir=tests | grep -v -E "# password|# secret|test-api-key|your-openai-api-key-here|your-api-key|\\$\\{|\\$\\{.*\\}|instance\\.|const\\s|let\\s|var\\s"; then
          echo "⚠️ Found possible credentials"
          exit 1
        else
          echo "✅ No credentials found"
        fi

  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Memory usage test
      run: |
        # 监控内存使用的测试
        mkdir -p /tmp/perf-test
        cd /tmp/perf-test
        node -e "
        const creator = require('${{ github.workspace }}/scripts/create-project');
        const test = async () => {
          const startMemory = process.memoryUsage().heapUsed;
          await new creator().createProject('perf-test', { createGitHub: false });
          const endMemory = process.memoryUsage().heapUsed;
          console.log(\`Memory used: \${Math.round((endMemory - startMemory) / 1024 / 1024)}MB\`);
          if (endMemory - startMemory > 100 * 1024 * 1024) {
            console.log('❌ High memory usage detected');
            process.exit(1);
          } else {
            console.log('✅ Memory usage within limits');
          }
        };
        test();
        "
        
    - name: Large batch test
      run: |
        # 测试大量项目创建的性能
        echo '{"projects":' > /tmp/large-batch.json
        echo '[' >> /tmp/large-batch.json
        for i in {1..20}; do
          echo -n '{"name":"perf-test-'$i'","options":{"createGitHub":false}}' >> /tmp/large-batch.json
          if [ $i -lt 20 ]; then echo ',' >> /tmp/large-batch.json; fi
        done
        echo ']' >> /tmp/large-batch.json
        echo '}' >> /tmp/large-batch.json
        
        start_time=$(date +%s)
        cd /tmp
        timeout 60s node /home/runner/work/daily-report-project-creator/daily-report-project-creator/scripts/batch-create.js file large-batch.json --output-dir /tmp/batch-test-output || { echo "⚠️ Batch creation timed out"; exit 1; }
        end_time=$(date +%s)
        
        duration=$((end_time - start_time))
        if [ $duration -gt 60 ]; then
          echo "❌ Batch creation took too long: ${duration}s"
        else
          echo "✅ Batch creation completed in ${duration}s"
        fi

  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [lint, test, integration, security, performance]
    if: always()
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Notify success
      if: ${{ needs.lint.result == 'success' && needs.test.result == 'success' && needs.integration.result == 'success' }}
      run: |
        echo "✅ All checks passed!"
        echo "Ready for deployment"
        
    - name: Notify failure
      if: ${{ needs.lint.result == 'failure' || needs.test.result == 'failure' || needs.integration.result == 'failure' }}
      run: |
        echo "❌ Some checks failed:"
        echo "Lint: ${{ needs.lint.result }}"
        echo "Test: ${{ needs.test.result }}"
        echo "Integration: ${{ needs.integration.result }}"
        echo "Please review the logs and fix the issues"