name: CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run linting
      run: npm run lint

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [16.x, 18.x, 20.x]
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run tests
      run: npm test -- --coverage
      
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Setup Git user
      run: |
        git config --global user.name "Integration Test"
        git config --global user.email "test@example.com"
        
    - name: Install dependencies
      run: npm ci
        
    - name: Test project creation
      run: |
        # Test in temporary directory
        cd /tmp
        echo '{"projects":[{"name":"integration-test","options":{"createGitHub":false}}]}' > /tmp/batch-config.json
        NODE_ENV=test node $GITHUB_WORKSPACE/scripts/batch-create.js file /tmp/batch-config.json
        
    - name: Validate created project structure
      run: |
        cd /tmp/github-projects/daily-report-integration-test
        test -f package.json
        test -f README.md
        test -f Agent.md
        test -f SKILL.md
        test -d config
        test -d src
        test -d .github/workflows

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run security audit
      run: npm audit --audit-level=high
      continue-on-error: true
      
    - name: Check for sensitive information
      run: |
        # 简化安全检查 - 只检查真正的硬编码敏感信息
        echo "🔍 开始安全扫描..."
        
        # 检查硬编码的OpenAI API密钥格式
        if grep -r "sk-[a-zA-Z0-9]{48}" . --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=coverage --exclude="*.md" --exclude="*.yml" --exclude="*.yaml" --exclude="package-lock.json" --exclude-dir=tests --exclude="*.test.js" --exclude="*.spec.js" --exclude-dir=templates; then
          echo "⚠️ Found hardcoded OpenAI API keys"
          exit 1
        fi
        
        # 检查硬编码的GitHub personal access tokens
        if grep -r "ghp_[a-zA-Z0-9]{36}" . --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=coverage --exclude="*.md" --exclude="*.yml" --exclude="*.yaml" --exclude="package-lock.json" --exclude-dir=tests --exclude="*.test.js" --exclude="*.spec.js" --exclude-dir=templates; then
          echo "⚠️ Found hardcoded GitHub tokens"
          exit 1
        fi
        
        # 检查硬编码密码（格式：password = "value" 或 password: "value"）
        if grep -rE "(password|pwd)[[:space:]]*[:=][[:space:]]*['\"][^'\"]{4,}['\"]" . --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=coverage --exclude="*.md" --exclude="*.yml" --exclude="*.yaml" --exclude="package-lock.json" --exclude-dir=tests --exclude="*.test.js" --exclude="*.spec.js" --exclude-dir=templates | grep -v "password.*example\|password.*placeholder\|password.*test"; then
          echo "⚠️ Found possible hardcoded passwords"
          exit 1
        fi
        
        echo "✅ Security scan passed - no hardcoded sensitive information found"

  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Memory usage test
      run: |
        # 监控内存使用的测试
        mkdir -p /tmp/github-projects
        NODE_ENV=test node -e "
        const creator = require('./scripts/create-project');
        const test = async () => {
          const startMemory = process.memoryUsage().heapUsed;
          await new creator().createProject('perf-test', { createGitHub: false });
          const endMemory = process.memoryUsage().heapUsed;
          console.log(\`Memory used: \${Math.round((endMemory - startMemory) / 1024 / 1024)}MB\`);
          if (endMemory - startMemory > 100 * 1024 * 1024) {
            console.log('❌ High memory usage detected');
            process.exit(1);
          } else {
            console.log('✅ Memory usage within limits');
          }
        };
        test();
        "
        
    - name: Large batch test
      run: |
        # 测试大量项目创建的性能
        echo '{"projects":' > /tmp/large-batch.json
        echo '[' >> /tmp/large-batch.json
        for i in {1..20}; do
          echo -n '{"name":"perf-test-'$i'","options":{"createGitHub":false}}' >> /tmp/large-batch.json
          if [ $i -lt 20 ]; then echo ',' >> /tmp/large-batch.json; fi
        done
        echo ']' >> /tmp/large-batch.json
        echo '}' >> /tmp/large-batch.json
        
        start_time=$(date +%s)
        timeout 60s env NODE_ENV=test node scripts/batch-create.js file /tmp/large-batch.json || { echo "⚠️ Batch creation timed out"; exit 1; }
        end_time=$(date +%s)
        
        duration=$((end_time - start_time))
        if [ $duration -gt 60 ]; then
          echo "❌ Batch creation took too long: ${duration}s"
        else
          echo "✅ Batch creation completed in ${duration}s"
        fi

  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [lint, test, integration, security, performance]
    if: always()
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Notify success
      if: ${{ needs.lint.result == 'success' && needs.test.result == 'success' && needs.integration.result == 'success' }}
      run: |
        echo "✅ All checks passed!"
        echo "Ready for deployment"
        
    - name: Notify failure
      if: ${{ needs.lint.result == 'failure' || needs.test.result == 'failure' || needs.integration.result == 'failure' }}
      run: |
        echo "❌ Some checks failed:"
        echo "Lint: ${{ needs.lint.result }}"
        echo "Test: ${{ needs.test.result }}"
        echo "Integration: ${{ needs.integration.result }}"
        echo "Please review the logs and fix the issues"